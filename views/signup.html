<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Sign Up</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">🧵</div>
      <h2>Create Account</h2>
      <p>Join KariTrack as a Karigar</p>
    </div>

    <div id="alert-box"></div>

    <form method="POST" action="/signup" id="signupForm">
      <div class="form-group mb-20">
        <label>Full Name</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required/>
      </div>
      <div class="form-group mb-20">
        <label>Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required/>
      </div>
      <div class="form-group mb-20">
        <label>Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10" required/>
      </div>
      <div class="form-group mb-20">
        <label>Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" class="form-control" placeholder="Create a password" required/>
          <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <div class="form-group mb-20">
        <label>Confirm Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm your password" required/>
          <span class="password-toggle" onclick="togglePassword('confirm_password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <button type="submit" class="btn btn-success btn-w100">Create Account</button>
    </form>

    <div class="auth-links">
      <a href="/">Already have an account? Login</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ ${decodeURIComponent(err).replace(/\+/g,' ')}</div>`;
  }

  document.getElementById('signupForm').addEventListener('submit', (e) => {
    const pwd = document.getElementById('password').value;
    const cpwd = document.getElementById('confirm_password').value;
    if (pwd !== cpwd) {
      e.preventDefault();
      document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ Passwords do not match</div>`;
    }
  });
</script>
</body>
</html>
