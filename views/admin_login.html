<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Admin Login</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">🛡️</div>
      <h2>Admin Login</h2>
      <p>KariTrack Administration Panel</p>
    </div>

    <div id="alert-box"></div>

    <form method="POST" action="/admin-login">
      <div class="form-group mb-20">
        <label>Admin ID</label>
        <input type="text" id="email" name="email" class="form-control" placeholder="Enter admin ID" required/>
      </div>
      <div class="form-group mb-20">
        <label>Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required/>
          <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <div class="form-check mb-20">
        <input type="checkbox" id="remember" name="remember"/>
        <label for="remember">Remember Me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-w100">Login as Admin</button>
    </form>

    <div class="auth-links">
      <a href="/">← Back to Karigar Login</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  if (err) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ ${decodeURIComponent(err).replace(/\+/g,' ')}</div>`;
  }
</script>
</body>
</html>
