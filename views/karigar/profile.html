<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - My Professional Profile</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .profile-container { max-width: 900px; margin: 0 auto; }
    .profile-header {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    .profile-header::after {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 200px; height: 200px; background: var(--primary);
      opacity: 0.05; border-radius: 50%;
    }
    .profile-avatar-large {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 800; color: white;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .profile-info h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
    .profile-info p { color: var(--text-muted); font-size: 0.95rem; }
    
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .section-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title span { color: var(--primary); }

    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; padding: 30px 20px; }
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="profile-container">
    <div class="profile-header">
      <div class="profile-avatar-large" id="main-avatar">?</div>
      <div class="profile-info">
        <h2 id="display-name">Loading...</h2>
        <p id="display-email">..._email_...</p>
        <div class="mt-20">
          <span class="badge badge-primary">⭐ Verified Karigar</span>
        </div>
      </div>
    </div>

    <div id="alert-box"></div>

    <form id="profileForm">
      <div class="profile-grid">
        <!-- Personal Info -->
        <div class="card">
          <h3 class="section-title"><span>👤</span> Personal Information</h3>
          <div class="form-group mb-20">
            <label>Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required/>
          </div>
          <div class="form-group mb-20">
            <label>Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required/>
          </div>
          <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" id="mobile" class="form-control" readonly title="Mobile cannot be changed online"/>
            <small class="text-muted">Contact admin to change mobile number.</small>
          </div>
        </div>

        <!-- Security -->
        <div class="card">
          <h3 class="section-title"><span>🔒</span> Security & Password</h3>
          <p class="text-muted mb-20" style="font-size: 0.85rem;">Update your password regularly to keep your account safe.</p>
          <div class="form-group mb-20">
            <label>New Password</label>
            <div class="password-field-wrapper">
              <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"/>
              <span class="password-toggle" onclick="togglePassword('password', this)"></span>
            </div>
          </div>
          <div class="form-group mb-20">
            <label>Confirm Password</label>
            <div class="password-field-wrapper">
              <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••"/>
              <span class="password-toggle" onclick="togglePassword('confirm_password', this)"></span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-w100" style="height: 46px; margin-top: 10px;">
            ✨ Save All Changes
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderKarigarSidebar('profile');

  async function loadProfile() {
    const profile = await apiGet('/api/karigar/profile-details');
    if (profile) {
      document.getElementById('name').value = profile.name;
      document.getElementById('email').value = profile.email;
      document.getElementById('mobile').value = profile.mobile;
      
      document.getElementById('display-name').textContent = profile.name;
      document.getElementById('display-email').textContent = profile.email;
      document.getElementById('main-avatar').textContent = profile.name.charAt(0).toUpperCase();
    }
  }

  document.getElementById('profileForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    if (data.password && data.password !== data.confirm_password) {
      return showAlert('alert-box', 'Passwords do not match', 'danger');
    }

    const res = await apiPost('/api/karigar/update-profile', data);
    if (res.success) {
      showAlert('alert-box', 'Profile successfully updated!', 'success');
      loadProfile(); // Refresh UI
      updateSidebarInfo(); // Refresh sidebar
      
      if (data.password) {
        setTimeout(() => {
            alert('Password changed. Please login again.');
            location.href = '/logout';
        }, 1500);
      }
    } else {
      showAlert('alert-box', res.error || 'Update failed', 'danger');
    }
  };

  loadProfile();
</script>
</body>
</html>
