<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - My Profile</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="topbar">
    <h1>👤 My Profile</h1>
  </div>

  <div id="alert-box"></div>

  <div class="card" style="max-width: 600px;">
    <form id="profileForm">
      <div class="form-group mb-20">
        <label>Full Name</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="Update your name" required/>
      </div>
      <div class="form-group mb-20">
        <label>Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Update your email" required/>
      </div>
      <hr class="mb-20" style="border:0; border-top: 1px solid var(--border)">
      <div class="form-group mb-20">
        <label>New Password (leave blank to keep current)</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" class="form-control" placeholder="New Password"/>
          <span class="password-toggle" onclick="togglePassword('password', this)"></span>
        </div>
      </div>
      <div class="form-group mb-20">
        <label>Confirm New Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm New Password"/>
          <span class="password-toggle" onclick="togglePassword('confirm_password', this)"></span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderKarigarSidebar('profile');

  async function loadProfile() {
    const data = await apiGet('/api/me');
    // We need more details than /api/me gives
    const profile = await apiGet('/api/karigar/profile-details');
    if (profile) {
      document.getElementById('name').value = profile.name;
      document.getElementById('email').value = profile.email;
    }
  }

  document.getElementById('profileForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    if (data.password && data.password !== data.confirm_password) {
      return showAlert('alert-box', 'Passwords do not match', 'danger');
    }

    const res = await apiPost('/api/karigar/update-profile', data);
    if (res.success) {
      showAlert('alert-box', 'Profile updated successfully!', 'success');
      if (data.password) {
        setTimeout(() => location.href = '/logout', 2000);
      }
    } else {
      showAlert('alert-box', res.error || 'Update failed', 'danger');
    }
  };

  loadProfile();
</script>
</body>
</html>
