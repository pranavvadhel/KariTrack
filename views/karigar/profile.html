<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - My Professional Profile</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .profile-container { max-width: 900px; margin: 0 auto; }
    .profile-header {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    .profile-header::after {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 200px; height: 200px; background: var(--primary);
      opacity: 0.05; border-radius: 50%;
    }
    .profile-avatar-large {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 800; color: white;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .profile-info h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
    .profile-info p { color: var(--text-muted); font-size: 0.95rem; }
    
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .section-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title span { color: var(--primary); }

    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; padding: 30px 20px; }
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="profile-container">
    <div class="profile-header">
      <div class="profile-avatar-large" id="main-avatar">?</div>
      <div class="profile-info">
        <h2 id="display-name">Loading...</h2>
        <p id="display-email">..._email_...</p>
        <div class="mt-20">
          <span class="badge badge-primary">⭐ Verified Karigar</span>
        </div>
      </div>
    </div>

    <div id="alert-box"></div>

    <form id="profileForm">
      <div class="profile-grid">
        <!-- Personal Info -->
        <div class="card">
          <h3 class="section-title"><span>👤</span> Personal Information</h3>
          <div class="form-group mb-20">
            <label>Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required/>
          </div>
          <div class="form-group mb-20">
            <label>Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required/>
          </div>
          <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" id="mobile" class="form-control" readonly title="Mobile cannot be changed online"/>
          </div>
        </div>

        <!-- Security -->
        <div class="card">
          <h3 class="section-title"><span>🔒</span> Security & Password</h3>
          <div class="form-group mb-20">
            <label>New Password (Optional)</label>
            <div class="password-field-wrapper">
              <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"/>
              <span class="password-toggle" onclick="togglePassword('password', this)"></span>
            </div>
          </div>
          <div class="form-group mb-20" id="otp-section" style="display:none; background:rgba(99,102,241,0.05); padding:15px; border-radius:12px; border:1px dashed var(--primary)">
            <label style="color:var(--primary)">Enter Verification OTP</label>
            <input type="text" id="otp" name="otp" class="form-control" placeholder="6-digit code sent to your email"/>
            <p class="text-muted mt-20" style="font-size:0.75rem">We sent a security code to your registered email to authorize these changes.</p>
          </div>
          
          <div id="action-buttons">
            <button type="button" class="btn btn-secondary btn-w100 mb-20" onclick="requestOtp()" id="otpBtn">
              📨 Request Verification OTP
            </button>
            <button type="submit" class="btn btn-primary btn-w100" id="saveBtn" disabled style="height: 46px; opacity: 0.5;">
              ✅ Confirm & Save Changes
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderKarigarSidebar('profile');
  updateSidebarInfo();

  async function loadProfile() {
    const profile = await apiGet('/api/karigar/profile-details');
    if (profile) {
      document.getElementById('name').value = profile.name;
      document.getElementById('email').value = profile.email;
      document.getElementById('mobile').value = profile.mobile;
      document.getElementById('display-name').textContent = profile.name;
      document.getElementById('display-email').textContent = profile.email;
      document.getElementById('main-avatar').textContent = profile.name.charAt(0).toUpperCase();
    }
  }

  async function requestOtp() {
    const btn = document.getElementById('otpBtn');
    btn.textContent = '⌛ Sending...';
    btn.disabled = true;

    const res = await apiPost('/api/karigar/request-profile-otp', {});
    if (res.success) {
      showAlert('alert-box', res.message, 'info');
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('saveBtn').style.opacity = '1';
      btn.textContent = '📨 Resend OTP';
      setTimeout(() => btn.disabled = false, 30000);
    } else {
      showAlert('alert-box', res.error || 'Failed to send OTP', 'danger');
      btn.textContent = '📨 Request Verification OTP';
      btn.disabled = false;
    }
  }

  document.getElementById('profileForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    if (!data.otp) {
      return showAlert('alert-box', 'Please enter the verification OTP first.', 'danger');
    }

    const res = await apiPost('/api/karigar/update-profile', data);
    if (res.success) {
      const passwordChanged = data.password && data.password.trim().length > 0;

      if (passwordChanged) {
        showAlert('alert-box', 'Password changed! Logging you out in 3 seconds...', 'success');
        setTimeout(() => location.href = '/logout', 3000);
        return; // stop here, no need to refresh UI
      }

      showAlert('alert-box', 'Profile successfully updated!', 'success');
      loadProfile();
      document.getElementById('otp-section').style.display = 'none';
      document.getElementById('otp').value = '';
      document.getElementById('otpBtn').textContent = '📨 Request Verification OTP';
      document.getElementById('otpBtn').disabled = false;
      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveBtn').style.opacity = '0.5';
    } else {
      showAlert('alert-box', res.error || 'Identity verification failed. Check your OTP.', 'danger');
    }
  };

  loadProfile();
</script>
</body>
</html>
