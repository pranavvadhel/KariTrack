<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - My Profile</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .profile-container { max-width: 900px; margin: 0 auto; }
    .profile-header {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    .profile-header::after {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 200px; height: 200px; background: var(--primary);
      opacity: 0.05; border-radius: 50%;
    }
    .profile-avatar-large {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 800; color: white;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
      flex-shrink: 0;
    }
    .profile-info h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
    .profile-info p { color: var(--text-muted); font-size: 0.95rem; }
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .section-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title span { color: var(--primary); }
    .otp-hint {
      background: rgba(99,102,241,0.06);
      border: 1px dashed var(--primary);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      display: none;
    }
    .otp-hint label { color: var(--primary); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .otp-hint p { color: var(--text-muted); font-size: 0.75rem; margin-top: 6px; }
    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; padding: 30px 20px; }
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="profile-container">

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-avatar-large" id="main-avatar">?</div>
      <div class="profile-info">
        <h2 id="display-name">Loading...</h2>
        <p id="display-email">...</p>
        <div style="margin-top:14px">
          <span class="badge badge-primary">⭐ Verified Karigar</span>
        </div>
      </div>
    </div>

    <div id="alert-box"></div>

    <div class="profile-grid">

      <!-- Personal Info Card -->
      <div class="card">
        <h3 class="section-title"><span>👤</span> Personal Information</h3>

        <div class="form-group mb-20">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Your name"/>
        </div>
        <div class="form-group mb-20">
          <label>Mobile Number</label>
          <input type="text" id="mobile" class="form-control" readonly title="Contact admin to change"/>
        </div>
        <button class="btn btn-primary btn-w100" onclick="saveName()">
          💾 Save Name
        </button>
      </div>

      <!-- Email Card -->
      <div class="card">
        <h3 class="section-title"><span>📧</span> Change Email</h3>
        <p class="text-muted mb-20" style="font-size:0.85rem;">An OTP will be sent to your <strong>current email</strong> to verify this change.</p>

        <div class="form-group mb-20">
          <label>Current Email</label>
          <input type="email" id="current-email-display" class="form-control" readonly style="opacity:0.6"/>
        </div>
        <div class="form-group mb-20">
          <label>New Email Address</label>
          <input type="email" id="new-email" class="form-control" placeholder="Enter new email"/>
        </div>

        <div class="otp-hint" id="email-otp-box">
          <label>Enter OTP</label>
          <input type="text" id="email-otp" class="form-control" placeholder="6-digit code from your email" style="margin-top:8px"/>
          <p>Valid for 10 minutes. Check your inbox.</p>
        </div>

        <div style="display:flex; gap:10px; margin-top:16px;">
          <button class="btn btn-secondary" id="sendEmailOtpBtn" onclick="sendEmailOtp()" style="flex:1">
            📨 Send OTP
          </button>
          <button class="btn btn-primary" id="confirmEmailBtn" onclick="confirmEmailChange()" style="flex:1; display:none">
            ✅ Confirm
          </button>
        </div>
      </div>

      <!-- Password Card (full width) -->
      <div class="card" style="grid-column: 1 / -1;">
        <h3 class="section-title"><span>🔒</span> Change Password</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; align-items:end;">
          <div class="form-group">
            <label>New Password</label>
            <div class="password-field-wrapper">
              <input type="password" id="password" class="form-control" placeholder="••••••••"/>
              <span class="password-toggle" onclick="togglePassword('password', this)"></span>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-field-wrapper">
              <input type="password" id="confirm-password" class="form-control" placeholder="••••••••"/>
              <span class="password-toggle" onclick="togglePassword('confirm-password', this)"></span>
            </div>
          </div>
          <button class="btn btn-danger" onclick="savePassword()" style="height:44px;">
            🔑 Update Password
          </button>
        </div>
        <p class="text-muted" style="font-size:0.8rem; margin-top:12px;">⚠️ Your session stays active after a password change. No logout required.</p>
      </div>

    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderKarigarSidebar('profile');
  updateSidebarInfo();

  let originalEmail = '';

  async function loadProfile() {
    const profile = await apiGet('/api/karigar/profile-details');
    if (profile) {
      document.getElementById('name').value = profile.name;
      document.getElementById('mobile').value = profile.mobile || '';
      document.getElementById('current-email-display').value = profile.email;
      document.getElementById('display-name').textContent = profile.name;
      document.getElementById('display-email').textContent = profile.email;
      document.getElementById('main-avatar').textContent = profile.name.charAt(0).toUpperCase();
      originalEmail = profile.email;
    }
  }

  // ─── Save Name Only ───────────────────────────────────────────
  async function saveName() {
    const name = document.getElementById('name').value.trim();
    if (!name) return showAlert('alert-box', 'Name cannot be empty', 'danger');

    const res = await apiPost('/api/karigar/update-name', { name });
    if (res.success) {
      showAlert('alert-box', 'Name updated!', 'success');
      document.getElementById('display-name').textContent = name;
      updateSidebarInfo();
    } else {
      showAlert('alert-box', res.error || 'Failed to update name', 'danger');
    }
  }

  // ─── Email OTP Flow ───────────────────────────────────────────
  async function sendEmailOtp() {
    const newEmail = document.getElementById('new-email').value.trim();
    if (!newEmail) return showAlert('alert-box', 'Please enter a new email address first.', 'danger');
    if (newEmail === originalEmail) return showAlert('alert-box', 'New email is the same as current email.', 'danger');

    const btn = document.getElementById('sendEmailOtpBtn');
    btn.disabled = true; btn.textContent = '⌛ Sending...';

    const res = await apiPost('/api/karigar/request-profile-otp', {});
    if (res.success) {
      showAlert('alert-box', 'OTP sent to your current email!', 'info');
      document.getElementById('email-otp-box').style.display = 'block';
      document.getElementById('confirmEmailBtn').style.display = 'flex';
      btn.textContent = '📨 Resend OTP';
      setTimeout(() => { btn.disabled = false; }, 30000);
    } else {
      showAlert('alert-box', res.error || 'Failed to send OTP', 'danger');
      btn.textContent = '📨 Send OTP';
      btn.disabled = false;
    }
  }

  async function confirmEmailChange() {
    const newEmail = document.getElementById('new-email').value.trim();
    const otp = document.getElementById('email-otp').value.trim();
    if (!otp) return showAlert('alert-box', 'Enter the OTP from your email.', 'danger');

    const res = await apiPost('/api/karigar/update-email', { email: newEmail, otp });
    if (res.success) {
      showAlert('alert-box', 'Email updated successfully!', 'success');
      document.getElementById('email-otp-box').style.display = 'none';
      document.getElementById('confirmEmailBtn').style.display = 'none';
      document.getElementById('sendEmailOtpBtn').textContent = '📨 Send OTP';
      document.getElementById('new-email').value = '';
      document.getElementById('email-otp').value = '';
      loadProfile();
    } else {
      showAlert('alert-box', res.error || 'Invalid OTP or verification failed', 'danger');
    }
  }

  // ─── Password Change (no logout!) ─────────────────────────────
  async function savePassword() {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirm-password').value;
    if (!pw) return showAlert('alert-box', 'New password cannot be empty', 'danger');
    if (pw !== cpw) return showAlert('alert-box', 'Passwords do not match', 'danger');
    if (pw.length < 6) return showAlert('alert-box', 'Password must be at least 6 characters', 'danger');

    const res = await apiPost('/api/karigar/update-password', { password: pw });
    if (res.success) {
      showAlert('alert-box', 'Password changed successfully! You remain logged in.', 'success');
      document.getElementById('password').value = '';
      document.getElementById('confirm-password').value = '';
    } else {
      showAlert('alert-box', res.error || 'Failed to change password', 'danger');
    }
  }

  loadProfile();
</script>
</body>
</html>
