<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="topbar">
    <h1>📊 Dashboard</h1>
    <div class="user-badge">
      <div class="badge-avatar">A</div>
      <span>Admin</span>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="card-grid" id="statsGrid">
    <div class="loading"><div class="spinner"></div> Loading stats...</div>
  </div>

  <!-- Filters -->
  <div class="form-card mb-28">
    <div class="form-row">
      <div class="form-group">
        <label>Filter by Karigar</label>
        <select id="karigarFilter" class="form-select" onchange="loadDashboard()">
          <option value="0">All Karigars</option>
        </select>
      </div>
      <div class="form-group">
        <label>Time Period</label>
        <select id="periodFilter" class="form-select" onchange="toggleCustomDates(); loadDashboard()">
          <option value="all">All Time</option>
          <option value="weekly">Last 7 Days</option>
          <option value="monthly">Last 30 Days</option>
          <option value="custom">Custom Range</option>
        </select>
      </div>
      <div class="form-group" id="fromDateGroup" style="display:none">
        <label>From Date</label>
        <input type="date" id="fromDate" class="form-control" onchange="loadDashboard()"/>
      </div>
      <div class="form-group" id="toDateGroup" style="display:none">
        <label>To Date</label>
        <input type="date" id="toDate" class="form-control" onchange="loadDashboard()"/>
      </div>
    </div>
  </div>

  <!-- Filtered Total -->
  <div class="card mb-28" id="filteredCard" style="display:none">
    <h5 style="color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">Total Amount Earned (Filtered)</h5>
    <div class="stat-value text-success" id="filteredTotal" style="font-size:2rem; font-weight:800;">₹0.00</div>
  </div>

  <!-- Chart -->
  <div class="card mb-28">
    <h3 style="margin-bottom:20px;">📈 Monthly Overview</h3>
    <div class="chart-container">
      <canvas id="overviewChart"></canvas>
    </div>
  </div>
</div>

<!-- Item Breakdown Modal -->
<div class="modal-overlay" id="breakdownModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📦 Item Breakdown by Category</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <ul class="breakdown-list" id="breakdownList">
      <li>Loading...</li>
    </ul>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderAdminSidebar('dashboard');

  let chart = null;

  async function init() {
    // Load karigars for filter
    const karigars = await apiGet('/api/karigars');
    if (karigars) {
      const sel = document.getElementById('karigarFilter');
      karigars.forEach(k => {
        sel.innerHTML += `<option value="${k.id}">${k.name}</option>`;
      });
    }
    loadDashboard();
  }

  function toggleCustomDates() {
    const period = document.getElementById('periodFilter').value;
    const show = period === 'custom';
    document.getElementById('fromDateGroup').style.display = show ? 'flex' : 'none';
    document.getElementById('toDateGroup').style.display = show ? 'flex' : 'none';
  }

  async function loadDashboard() {
    const karigar_id = document.getElementById('karigarFilter').value;
    const period = document.getElementById('periodFilter').value;
    const from_date = document.getElementById('fromDate').value;
    const to_date = document.getElementById('toDate').value;

    let url = `/api/dashboard-stats?karigar_id=${karigar_id}&period=${period}`;
    if (period === 'custom' && from_date && to_date) {
      url += `&from_date=${from_date}&to_date=${to_date}`;
    }

    const data = await apiGet(url);
    if (!data) {
      document.getElementById('statsGrid').innerHTML = '<div class="alert alert-danger">⚠️ Failed to load dashboard stats. Please check your database connection or try again.</div>';
      return;
    }

    // Stats Grid
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card blue">
        <div class="stat-icon">💰</div>
        <div class="stat-value">${formatCurrency(data.totalPayments)}</div>
        <div class="stat-label">Total Payments</div>
      </div>
      <div class="stat-card green clickable-stat" onclick="openModal()">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${data.totalItems.toLocaleString()}</div>
        <div class="stat-label">Items Completed ▼</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-icon">👷</div>
        <div class="stat-value">${data.activeKarigars}</div>
        <div class="stat-label">Active Karigars</div>
      </div>
    `;

    // Filtered total
    if (karigar_id !== '0' || period !== 'all') {
      document.getElementById('filteredCard').style.display = 'block';
      document.getElementById('filteredTotal').textContent = formatCurrency(data.filteredTotal);
    } else {
      document.getElementById('filteredCard').style.display = 'none';
    }

    // Breakdown list
    const list = document.getElementById('breakdownList');
    if (data.itemBreakdown && data.itemBreakdown.length > 0) {
      list.innerHTML = data.itemBreakdown.map(item => `
        <li>
          <span>${item.category_name}</span>
          <span class="badge badge-primary">${item.count}</span>
        </li>
      `).join('');
    } else {
      list.innerHTML = '<li><span class="text-muted">No data available</span></li>';
    }

    // Chart
    const labels = data.chartData.map(d => d.month);
    const items = data.chartData.map(d => d.items);
    const payments = data.chartData.map(d => parseFloat(d.payment));

    if (chart) chart.destroy();
    const ctx = document.getElementById('overviewChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Items',
            data: items,
            backgroundColor: 'rgba(99,102,241,0.7)',
            borderRadius: 6,
          },
          {
            label: 'Payment (₹)',
            data: payments,
            backgroundColor: 'rgba(6,182,212,0.7)',
            borderRadius: 6,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { family: 'Inter' } } }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
          y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
        }
      }
    });
  }

  function openModal() {
    document.getElementById('breakdownModal').classList.add('show');
  }
  function closeModal() {
    document.getElementById('breakdownModal').classList.remove('show');
  }

  init();
</script>
</body>
</html>
