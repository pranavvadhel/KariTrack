<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Karigar Profile</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar">
    <h1>👷 Karigar Profile</h1>
    <a href="/admin/karigars" class="btn btn-secondary">← Back to Karigars</a>
  </div>

  <div id="profileContainer">
    <div class="loading"><div class="spinner"></div> Loading profile...</div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderAdminSidebar('karigars');
    updateSidebarInfo();

  const id = location.pathname.split('/').pop();
  let currentFilter = 'all';

  async function loadProfile() {
    const data = await apiGet(`/api/karigars/${id}/profile?filter=${currentFilter}`);
    if (!data) return;

    const { karigar, entries, totals } = data;
    if (!karigar) {
      document.getElementById('profileContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Karigar not found</p></div>`;
      return;
    }

    const rows = entries.length > 0
      ? entries.map((r, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${r.category_name}</td>
            <td>${r.quantity}</td>
            <td>${formatCurrency(r.price_per_item)}</td>
            <td>${formatCurrency(r.total)}</td>
            <td>${formatDate(r.date)}</td>
          </tr>
        `).join('')
      : `<tr><td colspan="6"><div class="empty-state" style="padding:30px"><p>No work records found.</p></div></td></tr>`;

    document.getElementById('profileContainer').innerHTML = `
      <div class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); margin-bottom:24px;">
        <div class="card">
          <div style="font-size:1.8rem;margin-bottom:8px;">👤</div>
          <div style="font-weight:700; font-size:1.1rem;">${karigar.name}</div>
          <div style="color:var(--text-muted); font-size:0.85rem; margin-top:4px;">📱 ${karigar.mobile || 'N/A'}</div>
          <div style="color:var(--text-muted); font-size:0.85rem;">📧 ${karigar.email}</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">💰</div>
          <div class="stat-value">${formatCurrency(totals?.total_earned)}</div>
          <div class="stat-label">Total Earned</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">📦</div>
          <div class="stat-value">${totals?.total_qty || 0}</div>
          <div class="stat-label">Total Items</div>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="table-header">
          <h3>📋 Work History</h3>
          <select class="form-select" style="width:auto" onchange="currentFilter=this.value; loadProfile()">
            <option value="all" ${currentFilter==='all'?'selected':''}>All Time</option>
            <option value="weekly" ${currentFilter==='weekly'?'selected':''}>Last 7 Days</option>
            <option value="monthly" ${currentFilter==='monthly'?'selected':''}>This Month</option>
          </select>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr><th>#</th><th>Category</th><th>Quantity</th><th>Price/Item</th><th>Total</th><th>Date</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  loadProfile();
</script>
</body>
</html>
