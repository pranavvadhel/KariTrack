<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Edit Sizes</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar">
    <h1>🏷️ Manage Sizes</h1>
  </div>

  <div id="alert-box"></div>

  <!-- Add New Size -->
  <div class="form-card mb-28">
    <h3 style="margin-bottom:16px; font-size:1rem;">Add New Size</h3>
    <div class="form-row">
      <div class="form-group" style="flex: 2">
        <label>Size Name / Range (e.g. 0 to 2, 10*18)</label>
        <input type="text" id="newSizeName" class="form-control" placeholder="e.g. 0 to 2"/>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn btn-success" onclick="addSize()">Add Size</button>
      </div>
    </div>
  </div>

  <!-- Sizes Table -->
  <div class="table-wrapper">
    <div class="table-header">
      <h3>All Preset Sizes</h3>
      <span id="sizeCount" style="color:var(--text-muted); font-size:0.85rem;"></span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>#</th><th>Size Name</th><th style="width: 200px">Actions</th></tr>
        </thead>
        <tbody id="sizeTableBody">
          <tr><td colspan="3"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>🗑️ Delete Size</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--text-muted); margin-bottom:20px;">Are you sure you want to delete this size preset?</p>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderAdminSidebar('sizes');
  updateSidebarInfo();
  let deleteId = null;

  async function loadSizes() {
    const sizes = await apiGet('/api/sizes') || [];
    document.getElementById('sizeCount').textContent = `${sizes.length} sizes`;
    const tbody = document.getElementById('sizeTableBody');

    if (sizes.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state" style="padding:30px"><div class="empty-icon">📏</div><p>No sizes yet.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = sizes.map((s, i) => `
      <tr id="row-${s.id}">
        <td>${i + 1}</td>
        <td>
          <input type="text" id="name-${s.id}" class="form-control" value="${s.size_name}" style="max-width:300px"/>
        </td>
        <td style="display:flex; gap:8px; flex-wrap:nowrap;">
          <button class="btn btn-primary btn-sm" onclick="updateSize(${s.id})">✅ Update</button>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${s.id})">🗑️ Delete</button>
        </td>
      </tr>
    `).join('');
  }

  async function addSize() {
    const name = document.getElementById('newSizeName').value.trim();
    if (!name) {
      showAlert('alert-box', 'Please enter a size name', 'danger');
      return;
    }
    const result = await apiPost('/admin/sizes/add', { size_name: name });
    if (result.success) {
      document.getElementById('newSizeName').value = '';
      showAlert('alert-box', 'Size added successfully!', 'success');
      loadSizes();
    } else {
      showAlert('alert-box', result.error || 'Failed to add size', 'danger');
    }
  }

  async function updateSize(id) {
    const name = document.getElementById(`name-${id}`).value.trim();
    if (!name) return;
    const result = await apiPost('/admin/sizes/update', { size_id: id, size_name: name });
    if (result.success) {
      showAlert('alert-box', 'Size updated!', 'success');
    } else {
      showAlert('alert-box', result.error || 'Failed to update', 'danger');
    }
  }

  function openDeleteModal(id) {
    deleteId = id;
    document.getElementById('deleteModal').classList.add('show');
  }
  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    deleteId = null;
  }

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (!deleteId) return;
    const result = await apiPost(`/admin/sizes/delete/${deleteId}`, {});
    closeDeleteModal();
    if (result.success) {
      showAlert('alert-box', 'Size deleted!', 'success');
      loadSizes();
    } else {
      showAlert('alert-box', 'Failed to delete size', 'danger');
    }
  });

  loadSizes();
</script>
</body>
</html>
