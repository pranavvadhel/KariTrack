<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Payroll Management</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <style>
    /* Compact horizontal-scroll table for mobile */
    .table-scroll { 
      overflow-x: auto; 
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 640px) {
      tbody td { padding: 10px 10px; font-size: 0.82rem; }
      thead th { padding: 10px 10px; font-size: 0.72rem; white-space: nowrap; }
      .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
      table { min-width: 520px; }
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="main-content">
  <div class="topbar">
    <h1>💰 Payroll Management</h1>
    <div>
      <button class="btn btn-secondary" onclick="exportFullReport()">📊 Export Report</button>
    </div>
  </div>

  <div id="alert-box"></div>

  <!-- Filters Section -->
  <div class="card mb-20">
    <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end;">
      <div style="flex: 1; min-width: 200px;">
        <label style="font-weight:bold; font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Search</label>
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="form-control" placeholder="Search by name, phone..." oninput="loadPayroll()"/>
        </div>
      </div>
      <div style="flex: 1; min-width: 150px;">
        <label style="font-weight:bold; font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Filter by Month</label>
        <input type="month" id="monthFilter" class="form-control" onchange="loadPayroll()"/>
      </div>
      <div style="flex: 1; min-width: 150px;">
        <label style="font-weight:bold; font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Start Date</label>
        <input type="date" id="startDateFilter" class="form-control" onchange="document.getElementById('monthFilter').value=''; loadPayroll()"/>
      </div>
      <div style="flex: 1; min-width: 150px;">
        <label style="font-weight:bold; font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">End Date</label>
        <input type="date" id="endDateFilter" class="form-control" onchange="document.getElementById('monthFilter').value=''; loadPayroll()"/>
      </div>
      <div>
        <button class="btn btn-outline-primary" style="height: 42px;" onclick="resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Karigar Name</th>
            <th>Unpaid Amount</th>
            <th>Paid Amount</th>
            <th>Work Entries</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="payrollTable">
          <tr><td colspan="5"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box" style="max-width: 800px;">
    <div class="modal-header">
      <h3 id="modalTitle">Payment History</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modalStats" class="mb-20"></div>
      <div class="table-responsive">
        <table class="table table-sm">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="markPaidBtn">Mark All as Paid</button>
      <button class="btn btn-outline-primary" id="downloadSlipBtn">Download Salary Slip</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderAdminSidebar('payroll');
  updateSidebarInfo();

  function getFilterQuery() {
    const search = document.getElementById('searchInput').value;
    const month = document.getElementById('monthFilter').value;
    const startDate = document.getElementById('startDateFilter').value;
    const endDate = document.getElementById('endDateFilter').value;

    let query = new URLSearchParams();
    if (search) query.append('search', search);
    if (month) query.append('month', month);
    if (startDate && endDate) {
      query.append('start_date', startDate);
      query.append('end_date', endDate);
    }
    return query.toString();
  }

  function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('monthFilter').value = '';
    document.getElementById('startDateFilter').value = '';
    document.getElementById('endDateFilter').value = '';
    loadPayroll();
  }

  async function loadPayroll() {
    const query = getFilterQuery();
    const data = await apiGet(`/api/payroll/summary?${query}`);
    if (!data) return;

    const tbody = document.getElementById('payrollTable');

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👷</div><p>No records found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(item => `
      <tr>
        <td data-label="Karigar"><strong>${item.name}</strong><br><small class="text-muted">${item.mobile}</small></td>
        <td data-label="Unpaid" class="text-danger fw-bold">${formatCurrency(item.unpaid_amount)}</td>
        <td data-label="Paid" class="text-success">${formatCurrency(item.paid_amount)}</td>
        <td data-label="Entries">${item.total_entries} logs</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="viewHistory(${item.id}, '${item.name}', ${item.unpaid_amount})">View Details</button>
        </td>
      </tr>
    `).join('');
  }

  let currentKarigar = null;

  async function viewHistory(id, name, unpaid) {
    currentKarigar = { id, name, unpaid };
    document.getElementById('modalTitle').textContent = `Payroll: ${name}`;
    document.getElementById('historyModal').classList.add('show');
    
    const entries = await apiGet(`/api/payroll/karigar/${id}/history`);
    const tbody = document.getElementById('historyTable');
    
    tbody.innerHTML = entries.map(we => `
      <tr>
        <td>${formatDate(we.date)}</td>
        <td>${we.category_name}</td>
        <td>${we.quantity}</td>
        <td>${formatCurrency(we.total)}</td>
        <td><span class="badge ${we.status === 'paid' ? 'badge-success' : 'badge-danger'}">${we.status.toUpperCase()}</span></td>
      </tr>
    `).join('');

    document.getElementById('markPaidBtn').style.display = unpaid > 0 ? 'inline-block' : 'none';
    document.getElementById('markPaidBtn').onclick = () => markAsPaid(id, unpaid);
    document.getElementById('downloadSlipBtn').onclick = () => generatePDF(name, entries);
  }

  async function markAsPaid(id, amount) {
    if (!confirm(`Are you sure you want to mark ${formatCurrency(amount)} as paid for ${currentKarigar.name}?`)) return;
    
    const res = await apiPost('/api/payroll/mark-paid', { karigar_id: id, amount });
    if (res.success) {
      showAlert('alert-box', res.message);
      closeModal();
      loadPayroll();
    }
  }

  function closeModal() {
    document.getElementById('historyModal').classList.remove('show');
  }

  function generatePDF(name, entries) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(20);
    doc.text('KariTrack Salary Slip', 14, 22);
    doc.setFontSize(12);
    doc.text(`Employee Name: ${name}`, 14, 32);
    doc.text(`Generated On: ${new Date().toLocaleDateString()}`, 14, 38);

    const tableData = entries.map(e => [
      formatDate(e.date),
      e.category_name,
      e.quantity,
      formatCurrency(e.total),
      e.status.toUpperCase()
    ]);

    doc.autoTable({
      startY: 45,
      head: [['Date', 'Category', 'Qty', 'Amount', 'Status']],
      body: tableData,
    });

    const finalY = doc.lastAutoTable.finalY + 10;
    const total = entries.reduce((acc, curr) => acc + parseFloat(curr.total), 0);
    doc.setFontSize(14);
    doc.text(`Total Amount: ${formatCurrency(total)}`, 14, finalY);

    doc.save(`SalarySlip_${name}_${new Date().getTime()}.pdf`);
  }

  async function exportFullReport() {
    const workbook = new ExcelJS.Workbook();
    const sheet = workbook.addWorksheet('Payroll Summary');
    
    sheet.columns = [
      { header: 'Karigar Name', key: 'name', width: 25 },
      { header: 'Unpaid Amount', key: 'unpaid', width: 15 },
      { header: 'Paid Amount', key: 'paid', width: 15 },
      { header: 'Total Entries', key: 'entries', width: 15 }
    ];

    const query = getFilterQuery();
    const data = await apiGet(`/api/payroll/summary?${query}`);
    if (!data) return;
    data.forEach(item => {
      sheet.addRow({
        name: item.name,
        unpaid: item.unpaid_amount,
        paid: item.paid_amount,
        entries: item.total_entries
      });
    });

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = window.URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = `PayrollReport_${new Date().getTime()}.xlsx`;
    anchor.click();
    window.URL.revokeObjectURL(url);
  }

  loadPayroll();
</script>
</body>
</html>
