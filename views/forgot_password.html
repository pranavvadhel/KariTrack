<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">🔒</div>
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a reset link</p>
    </div>

    <div id="alert-box"></div>

    <form method="POST" action="/forgot-password" id="forgotForm">
      <div class="form-group mb-20">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-w100">Send Reset Link</button>
    </form>

    <div class="auth-links">
      <a href="/">← Back to Login</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  const ok = params.get('success');
  if (err) document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ ${decodeURIComponent(err).replace(/\+/g,' ')}</div>`;
  if (ok) document.getElementById('alert-box').innerHTML = `<div class="alert alert-success">✅ ${decodeURIComponent(ok).replace(/\+/g,' ')}</div>`;

  document.getElementById('forgotForm').addEventListener('submit', function() {
    this.querySelector('button').textContent = 'Sending...';
  });
</script>
</body>
</html>
