<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Reset Password</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">🔑</div>
      <h2>Reset Password</h2>
      <p>Enter the 6-digit OTP sent to your email</p>
    </div>

    <div id="alert-box"></div>

    <form method="POST" action="/reset-password" id="resetForm">
      <div class="form-group mb-20">
        <label>Email Address</label>
        <input type="email" id="email" name="email" class="form-control" readonly required/>
      </div>
      <div class="form-group mb-20">
        <label>Verification OTP</label>
        <input type="text" name="otp" class="form-control" placeholder="6-digit code" required maxlength="6" pattern="[0-9]{6}"/>
      </div>
      <div class="form-group mb-20">
        <label>New Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6"/>
          <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <div class="form-group mb-20">
        <label>Confirm Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Repeat new password" required/>
          <span class="password-toggle" onclick="togglePassword('confirm_password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <button type="submit" class="btn btn-success btn-w100">Update Password</button>
    </form>

    <div class="auth-links">
      <a href="/forgot-password">Didn't get an email? Resend</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Auto-fill email from URL
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  if (email) document.getElementById('email').value = email;

  const err = params.get('error');
  const ok = params.get('success');
  if (err) document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ ${decodeURIComponent(err).replace(/\+/g,' ')}</div>`;
  if (ok) document.getElementById('alert-box').innerHTML = `<div class="alert alert-success">✅ ${decodeURIComponent(ok).replace(/\+/g,' ')}</div>`;

  document.getElementById('resetForm').addEventListener('submit', function(e) {
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('confirm_password').value;
    if (p1 !== p2) {
      e.preventDefault();
      document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠️ Passwords do not match</div>`;
      return;
    }
    this.querySelector('button').textContent = 'Updating...';
  });
</script>
</body>
</html>
