<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KariTrack - Login</title>
  <meta name="description" content="KariTrack - Karigar Work Tracking System Login">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">🧵</div>
      <h2>KariTrack</h2>
      <p>Karigar Work Tracking System</p>
    </div>

    <div id="alert-box"></div>

    <form method="POST" action="/login">
      <div class="form-group mb-20">
        <label>Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required autocomplete="email"/>
      </div>
      <div class="form-group mb-20">
        <label>Password</label>
        <div class="password-field-wrapper">
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password"/>
          <span class="password-toggle" onclick="togglePassword('password', this)">👁️‍🗨️</span>
        </div>
      </div>
      <div class="form-check mb-20">
        <input type="checkbox" id="remember" name="remember"/>
        <label for="remember">Remember Me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-w100" id="loginBtn">
        <span id="btnText">Login</span>
        <span id="btnSpinner" style="display:none" class="spinner"></span>
      </button>
    </form>

    <div class="auth-links">
      <a href="/signup">Don't have an account? Sign up</a>
      <a href="/forgot-password" style="color: var(--primary-light);">🔒 Forgot Password?</a>
      <a href="/admin-login" style="color: var(--text-muted);">🛡️ Admin Login</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Show error from URL params
  const params = new URLSearchParams(location.search);
  const err = params.get('error');
  const ok = params.get('success');
  if (err) showAlert(decodeURIComponent(err).replace(/\+/g,' '), 'danger');
  if (ok) showAlert(decodeURIComponent(ok).replace(/\+/g,' '), 'success');

  function showAlert(msg, type) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">⚠️ ${msg}</div>`;
  }

</script>
</body>
</html>
